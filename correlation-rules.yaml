# TraceLink OSINT Correlation Rules
# 95+ correlation rules for threat intelligence
# 
# Types:
#   - indicator_match: Match specific indicators
#   - threshold: Alert when values exceed thresholds
#   - sequence: Alert on sequential patterns
#   - anomaly: Detect anomalous behavior
#   - enrichment: Add contextual data
#
# Severity:
#   - critical, high, medium, low, info
#
# Operators:
#   - equals, contains, regex, startsWith, endsWith, in, gt, gte, lt, lte

version: "1.0"
rules:

  # ===== IDENTITY & BREACH RULES (20) =====

  - id: rule_001
    name: Email Breach Detected
    description: Alert when an email is found in known breaches
    type: indicator_match
    severity: high
    tags: [breach, email, critical]
    enabled: true
    confidence: 0.9
    conditions:
      - field: isBreached
        operator: equals
        value: true
    actions:
      - type: log
      - type: notify
        method: telegram

  - id: rule_002
    name: Multiple Breach Sources
    description: Email found in multiple breach databases
    type: threshold
    severity: critical
    tags: [breach, email]
    enabled: true
    confidence: 0.95
    conditions:
      - field: breachCount
        operator: gte
        threshold: 3
    actions:
      - type: log
      - type: notify
        method: telegram

  - id: rule_003
    name: Dehashed Entry Found
    description: Email found in Dehashed database
    type: indicator_match
    severity: critical
    tags: [breach, dehashed]
    enabled: true
    confidence: 0.95
    conditions:
      - field: dehashed.found
        operator: equals
        value: true

  - id: rule_004
    name: HaveIBeenPwned Alert
    description: Email found in HIBP database
    type: indicator_match
    severity: high
    tags: [breach, hibp]
    enabled: true
    confidence: 0.9
    conditions:
      - field: hibp.found
        operator: equals
        value: true

  - id: rule_005
    name: Password Exposure
    description: Detected exposed passwords in breach data
    type: indicator_match
    severity: critical
    tags: [breach, password]
    enabled: true
    confidence: 0.95
    conditions:
      - field: breachData.passwordExposed
        operator: equals
        value: true

  - id: rule_006
    name: Credential Stuffing Risk
    description: Multiple accounts with same password
    type: sequence
    severity: high
    tags: [breach, credentials]
    enabled: true
    confidence: 0.8
    conditions:
      - field: uniquePasswords
        value: 1
      - field: accountCount
        value: 3

  - id: rule_007
    name: Recent Breach Activity
    description: Account involved in recent breach
    type: indicator_match
    severity: high
    tags: [breach, recent]
    enabled: true
    confidence: 0.85
    conditions:
      - field: breachDate
        operator: gte
        value: 90

  - id: rule_008
    name: Sensitive Data Exposure
    description: Sensitive data found in breach
    type: indicator_match
    severity: critical
    tags: [breach, sensitive]
    enabled: true
    confidence: 0.9
    conditions:
      - field: breachData.containsSensitive
        operator: equals
        value: true

  - id: rule_009
    name: Corporate Email Breach
    description: Corporate email found in breaches
    type: indicator_match
    severity: high
    tags: [breach, corporate]
    enabled: true
    confidence: 0.85
    conditions:
      - field: emailType
        operator: equals
        value: corporate

  - id: rule_010
    name: Government Email Breach
    description: Government domain email found in breach
    type: indicator_match
    severity: critical
    tags: [breach, government]
    enabled: true
    confidence: 0.95
    conditions:
      - field: emailDomain
        operator: regex
        pattern: "\\.(gov|mil|govt)"

  - id: rule_011
    name: Healthcare Breach
    description: Healthcare-related email found in breach
    type: indicator_match
    severity: critical
    tags: [breach, healthcare, hipaa]
    enabled: true
    confidence: 0.9
    conditions:
      - field: emailDomain
        operator: regex
        pattern: "(hospital|health|medical|clinic|pharma)"

  - id: rule_012
    name: Financial Data Breach
    description: Financial information in breach
    type: indicator_match
    severity: critical
    tags: [breach, financial]
    enabled: true
    confidence: 0.95
    conditions:
      - field: breachData.containsFinancial
        operator: equals
        value: true

  - id: rule_013
    name: Educational Institution Breach
    description: Educational email found in breach
    type: indicator_match
    severity: medium
    tags: [breach, education]
    enabled: true
    confidence: 0.8
    conditions:
      - field: emailDomain
        operator: regex
        pattern: "\\.(edu|school|university)"

  - id: rule_014
    name: Fresh Breach Data
    description: Breach within last 30 days
    type: threshold
    severity: critical
    tags: [breach, fresh]
    enabled: true
    confidence: 0.95
    conditions:
      - field: daysSinceBreach
        operator: lt
        threshold: 30

  - id: rule_015
    name: Multiple Breaches Same Service
    description: Same account breached multiple times
    type: threshold
    severity: high
    tags: [breach, repeated]
    enabled: true
    confidence: 0.85
    conditions:
      - field: breachesPerService
        operator: gte
        threshold: 2

  - id: rule_016
    name: Credential Age Warning
    description: Old credentials still in use
    type: threshold
    severity: medium
    tags: [credentials, age]
    enabled: true
    confidence: 0.7
    conditions:
      - field: credentialAge
        operator: gte
        threshold: 365

  - id: rule_017
    name: Breach Data Quality
    description: High-quality breach data detected
    type: enrichment
    severity: info
    tags: [breach, enrichment]
    enabled: true
    confidence: 0.9
    conditions:
      - field: breachData.qualityScore
        operator: gte
        threshold: 0.8

  - id: rule_018
    name: Dark Web Listing
    description: Email found on dark web
    type: indicator_match
    severity: high
    tags: [darkweb, listing]
    enabled: true
    confidence: 0.85
    conditions:
      - field: darkweb.found
        operator: equals
        value: true

  - id: rule_019
    name: Stealer Log Detection
    description: Found in stealer malware logs
    type: indicator_match
    severity: critical
    tags: [malware, stealer]
    enabled: true
    confidence: 0.9
    conditions:
      - field: malwareLogs.stealer
        operator: equals
        value: true

  - id: rule_020
    name: Botnet Credential
    description: Credentials associated with botnet
    type: indicator_match
    severity: critical
    tags: [botnet, malware]
    enabled: true
    confidence: 0.9
    conditions:
      - field: malwareLogs.botnet
        operator: equals
        value: true

