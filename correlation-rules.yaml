  # ===== DOMAIN & INFRASTRUCTURE RULES (15) =====

  - id: rule_046
    name: Newly Registered Domain
    description: Domain registered within last 30 days
    type: threshold
    severity: medium
    tags: [domain, new]
    enabled: true
    confidence: 0.7
    conditions:
      - field: domain.age
        operator: lt
        threshold: 30

  - id: rule_047
    name: Domain Age Warning
    description: Very old domain (potential for old vulnerabilities)
    type: threshold
    severity: low
    tags: [domain, age]
    enabled: true
    confidence: 0.6
    conditions:
      - field: domain.age
        operator: gte
        threshold: 3650

  - id: rule_048
    name: Many Subdomains
    description: Domain has many subdomains
    type: threshold
    severity: medium
    tags: [domain, subdomain]
    enabled: true
    confidence: 0.7
    conditions:
      - field: domain.subdomainCount
        operator: gte
        threshold: 50

  - id: rule_049
    name: DNS Anomaly
    description: Unusual DNS configuration
    type: anomaly
    severity: high
    tags: [domain, dns]
    enabled: true
    confidence: 0.75
    conditions:
      - field: domain.dnsAnomalies
        operator: gte
        threshold: 2

  - id: rule_050
    name: Suspicious TLD
    description: Domain uses suspicious TLD
    type: indicator_match
    severity: medium
    tags: [domain, tld]
    enabled: true
    confidence: 0.7
    conditions:
      - field: domain.tld
        operator: in
        value: [xyz, top, gq, ml, cf, tk, pw, cc, ws]

  - id: rule_051
    name: Free Email Domain
    description: Using free email provider
    type: indicator_match
    severity: low
    tags: [domain, email]
    enabled: true
    confidence: 0.8
    conditions:
      - field: domain.emailProvider
        operator: in
        value: [gmail.com, yahoo.com, outlook.com, hotmail.com, protonmail.com]

  - id: rule_052
    name: Cloudflare Protected
    description: Domain uses Cloudflare
    type: enrichment
    severity: info
    tags: [domain, cloudflare]
    enabled: true
    confidence: 0.9
    conditions:
      - field: domain.cloudflare
        operator: equals
        value: true

  - id: rule_053
    name: Mail Server Configuration
    description: Check MX records
    type: enrichment
    severity: info
    tags: [domain, mail]
    enabled: true
    confidence: 0.8
    conditions:
      - field: domain.mxRecords
        operator: exists

  - id: rule_054
    name: SPF Record Missing
    description: No SPF record configured
