services:
  - type: web
    name: osint-api
    env: docker
    plan: pro
    region: oregon
    healthCheckPath: /api/health
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: tracelink-db
          property: connectionString
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: BASE_URL
        sync: false
