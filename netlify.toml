[build]
  command = "npm ci && npx prisma generate"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/bot/webhook"
  to = "/.netlify/functions/bot"
  status = 200

[[redirects]]
  from = "/api/me/*"
  to = "/.netlify/functions/me/:splat"
  status = 200

[[redirects]]
  from = "/api/osint/*"
  to = "/.netlify/functions/osint/:splat"
  status = 200

[[redirects]]
  from = "/click"
  to = "/.netlify/functions/api/click"
  status = 200

[[redirects]]
  from = "/api/click/track"
  to = "/.netlify/functions/api/click/complete"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/telegram-app.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "development"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://openfpcdn.io https://twa-dev.github.io; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://openfpcdn.io https://api.telegram.org; font-src 'self'; frame-ancestors 'none'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Content-Type-Options = "nosniff"
